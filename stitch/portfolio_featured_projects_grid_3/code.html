<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portfolio Contact Page - Light Theme</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1313ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-input-focus:focus {
            outline: none;
            border-color: #1313ec;
            box-shadow: 0 0 0 1px #1313ec;
        }
    </style>
</head>
<body class="bg-white text-slate-900 antialiased font-display">
<div class="relative flex min-h-screen flex-col overflow-x-hidden">
<header class="sticky top-0 z-50 w-full border-b border-slate-100 bg-white/80 backdrop-blur-md">
<div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg">
<span class="material-symbols-outlined text-white text-2xl">grid_view</span>
</div>
<span class="text-xl font-bold tracking-tight">Studio.A</span>
</div>
<nav class="hidden md:flex items-center gap-10">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Work</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">About</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Services</a>
<a class="text-sm font-medium text-primary" href="#">Contact</a>
</nav>
<div class="flex items-center gap-4">
<button class="bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all transform hover:scale-105 active:scale-95">
                    Hire Me
                </button>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center">
<section class="max-w-4xl w-full mx-auto px-6 py-24 text-center">
<div class="mb-16">
<span class="text-primary font-bold uppercase tracking-widest text-xs mb-6 block">Get in touch</span>
<h1 class="text-5xl md:text-8xl font-black mb-8 leading-tight tracking-tighter">
<a class="hover:text-primary transition-colors duration-300" href="mailto:hello@jay.dev">hello@jay.dev</a>
</h1>
<p class="text-lg md:text-xl text-slate-500 font-light leading-relaxed max-w-xl mx-auto">
                    Whether you have a project in mind or just want to say hi, my inbox is always open.
                </p>
</div>
<div class="max-w-xl mx-auto text-left">
<form action="#" class="space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-400" for="name">Full Name</label>
<input class="w-full bg-slate-50 border-slate-200 rounded-lg p-4 text-sm form-input-focus transition-all" id="name" name="name" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-400" for="email">Email Address</label>
<input class="w-full bg-slate-50 border-slate-200 rounded-lg p-4 text-sm form-input-focus transition-all" id="email" name="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-400" for="subject">Subject</label>
<input class="w-full bg-slate-50 border-slate-200 rounded-lg p-4 text-sm form-input-focus transition-all" id="subject" name="subject" placeholder="Project Inquiry" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-400" for="message">Message</label>
<textarea class="w-full bg-slate-50 border-slate-200 rounded-lg p-4 text-sm form-input-focus transition-all resize-none" id="message" name="message" placeholder="Tell me about your project..." rows="5"></textarea>
</div>
<button class="w-full bg-slate-900 hover:bg-black text-white py-5 rounded-lg font-bold text-lg transition-all transform hover:translate-y-[-2px] active:translate-y-[0px]" type="submit">
                        Send Message
                    </button>
</form>
</div>
</section>
</main>
<footer class="border-t border-slate-100 py-12 px-6">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
<div class="flex items-center gap-3">
<div class="bg-primary/10 p-1.5 rounded text-primary">
<span class="material-symbols-outlined text-lg">grid_view</span>
</div>
<span class="font-bold tracking-tight text-slate-900">Studio.A</span>
</div>
<div class="flex gap-10">
<a class="text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-xl">link</span>
</a>
<a class="text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-xl">terminal</span>
</a>
<a class="text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-xl">draw</span>
</a>
</div>
<div class="text-sm text-slate-400">
                © 2024 Jay Dev. All rights reserved.
            </div>
</div>
</footer>
</div>

</body></html>
