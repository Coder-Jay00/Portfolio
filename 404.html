<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0f' width='100' height='100' rx='20'/><text x='50' y='68' font-size='50' font-family='monospace' font-weight='bold' fill='%2300d4ff' text-anchor='middle'>JT</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: var(--bg-primary);
        }

        .error-container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .error-code {
            font-size: 12rem;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.05em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;
            filter: blur(40px);
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2rem;
            letter-spacing: -0.03em;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 400px;
            margin: 0 auto 3rem auto;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--accent-primary);
            color: var(--bg-primary);
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.25);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
            background: #fff;
            color: var(--bg-primary);
        }

        /* Ambient Orbs specifically for 404 */
        .orb-404-1 {
            top: 20%;
            left: 30%;
            width: 40vw;
            height: 40vw;
            background: #7c3aed;
            opacity: 0.15;
        }

        .orb-404-2 {
            bottom: 20%;
            right: 30%;
            width: 35vw;
            height: 35vw;
            background: #00d4ff;
            opacity: 0.1;
        }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            .error-code {
                font-size: 8rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .error-message {
                font-size: 1rem;
                padding: 0 20px;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.25rem;
                margin-bottom: 1.5rem;
            }
            .btn-home {
                padding: 14px 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="cyber-bg">
        <!-- Ambient Glowing Orbs -->
        <div class="ambient-orb orb-404-1"></div>
        <div class="ambient-orb orb-404-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- 404 Content -->
    <main class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Signal Lost</h2>
        <p class="error-message">
            The page you're looking for has drifted into the void.
            It might have been moved, deleted, or never existed in this dimension.
        </p>
        <a href="index.html" class="btn-home">
            Return to Base
        </a>
    </main>

</body>

</html>
